name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  
  # BUILD 
  
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build App1 image
        run: docker build -t app1:test ./App1

      - name: Build App2 image
        run: docker build -t app2:test ./App2

  
  # TEST — smoke test sur chaque image buildée
  
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build images
        run: |
          docker build -t app1:test ./App1
          docker build -t app2:test ./App2

      - name: Run App1 and smoke test
        run: |
          docker run -d --name test_app1 -p 8081:80 app1:test
          sleep 3
          curl -f http://localhost:8081/ || (docker logs test_app1 && exit 1)
          docker rm -f test_app1

      - name: Run App2 and smoke test
        run: |
          docker run -d --name test_app2 -p 8082:80 app2:test
          sleep 3
          curl -f http://localhost:8082/ || (docker logs test_app2 && exit 1)
          docker rm -f test_app2

  
  # DEPLOY — zero-downtime (blue-green)
  
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest code on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ secrets.EC2_PROJECT_PATH }}
            git pull origin main

      - name: Blue-Green deploy App1
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ secrets.EC2_PROJECT_PATH }}
            ./deploy.sh app1

      - name: Blue-Green deploy App2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ secrets.EC2_PROJECT_PATH }}
            ./deploy.sh app2

      - name: Cleanup unused Docker images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: docker image prune -f

  
  # MONITORING — smoke test post-déploiement en prod
  
  monitor:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check App1 is reachable (HTTPS)
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" https://kossiapp.duckdns.org)
          echo "App1 returned HTTP $CODE"
          [ "$CODE" == "200" ] || exit 1

      - name: Check App2 is reachable (HTTPS)
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" https://kossiapp2.duckdns.org)
          echo "App2 returned HTTP $CODE"
          [ "$CODE" == "200" ] || exit 1
